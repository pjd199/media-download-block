name: Build and Release Media Download Block

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write
env:
  PLUGIN_SLUG: media-download-block

jobs:
  build_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Block
        run: npm run build

      - name: Get Plugin Version
        id: get_version
        run: |
          # Extract version from the PHP header in the root file
          VERSION=$(grep -m 1 "Version:" ${{ env.PLUGIN_SLUG }}.php | awk '{print $NF}' | tr -d '\r')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Validate Release Version
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view v${{ env.VERSION }} >/dev/null 2>&1; then
            echo "::error::Release v${{ env.VERSION }} already exists! Update version in ${{ env.PLUGIN_SLUG }}.php."
            exit 1
          fi

      - name: Prepare Plugin for Zipping
        run: |
          mkdir -p ${{ env.PLUGIN_SLUG }}
          
          # Copy only production files
          cp ${{ env.PLUGIN_SLUG }}.php ${{ env.PLUGIN_SLUG }}/
          cp -r build/ ${{ env.PLUGIN_SLUG }}/
          
          # Include readme/license if they exist
          if [ -f readme.txt ]; then cp readme.txt ${{ env.PLUGIN_SLUG }}/; fi
          if [ -f LICENSE ]; then cp LICENSE ${{ env.PLUGIN_SLUG }}/; fi

      - name: Create Zip Archive
        run: |
          zip -r ${{ env.PLUGIN_SLUG }}-${{ env.VERSION }}.zip ${{ env.PLUGIN_SLUG }}/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: ${{ env.PLUGIN_SLUG }}-${{ env.VERSION }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-Cleanup
        if: always()
        run: |
          rm -rf ${{ env.PLUGIN_SLUG }}
          rm -f ${{ env.PLUGIN_SLUG }}-${{ env.VERSION }}.zip
