name: Build and Archive Plugin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install Dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build Block
        run: npm run build

      - name: Get Plugin Version
        id: get_version
        run: |
          VERSION=$(grep -m 1 "Version:" media-download-block.php | awk '{print $NF}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "SLUG=media-download-block" >> $GITHUB_OUTPUT

      - name: Create Deployment Folder
        run: |
          # 1. Define a STATIC slug for the folder
          PLUGIN_SLUG="media-download-block"
          
          # 2. Create the clean directory
          mkdir $PLUGIN_SLUG
          
          # 3. Copy files into that specific folder
          cp -r build $PLUGIN_SLUG/
          cp media-download-block.php $PLUGIN_SLUG/
          cp render.php $PLUGIN_SLUG/
          cp README.md $PLUGIN_SLUG/
          
          # 4. ZIP the folder (The ZIP name has the version, the FOLDER inside does not)
          zip -r ${PLUGIN_SLUG}-v${{ steps.get_version.outputs.VERSION }}.zip $PLUGIN_SLUG

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get_version.outputs.SLUG }}
          path: ${{ steps.get_version.outputs.SLUG }}/
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/main')
        continue-on-error: true
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          files: ${{ steps.get_version.outputs.SLUG }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}