name: Build and Archive Plugin

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Block
        run: npm run build

      - name: Get Plugin Version
        id: get_version
        run: |
          VERSION=$(grep -m 1 "Version:" media-download-block.php | awk '{print $NF}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "SLUG=media-download-block" >> $GITHUB_OUTPUT

      - name: Create Deployment Folder
        run: |
          mkdir ${{ steps.get_version.outputs.SLUG }}
          cp -r build ${{ steps.get_version.outputs.SLUG }}/
          cp media-download-block.php ${{ steps.get_version.outputs.SLUG }}/
          cp README.md ${{ steps.get_version.outputs.SLUG }}/
          zip -r ${{ steps.get_version.outputs.SLUG }}-${{ steps.get_version.outputs.VERSION }}.zip ${{ steps.get_version.outputs.SLUG }}

      # --- NEW STEP: ALWAYS EXPORT AS ARTIFACT ---
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get_version.outputs.SLUG }}-${{ steps.get_version.outputs.VERSION }}
          path: ${{ steps.get_version.outputs.SLUG }}-${{ steps.get_version.outputs.VERSION }}.zip
          retention-days: 7

      # --- RELEASE STEP: MAY FAIL IF VERSION EXISTS (CONTINUE ON ERROR) ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/main')
        continue-on-error: true # Prevents the whole workflow from showing Red if release fails
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          files: ${{ steps.get_version.outputs.SLUG }}-${{ steps.get_version.outputs.VERSION.zip }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}